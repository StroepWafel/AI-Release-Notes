name: 'AI Release Notes Generator'
description: 'Generate release notes using AI based on code changes since the previous release'
branding:
  icon: 'file-text'
  color: 'blue'
inputs:
  groq_api_key:
    description: 'Groq API key for AI generation'
    required: true
  tag_name:
    description: 'Tag name for the release'
    required: true
  release_name:
    description: 'Name of the release (defaults to tag_name)'
    required: false
  draft:
    description: 'Create as draft release'
    required: false
    default: 'false'
  prerelease:
    description: 'Create as prerelease'
    required: false
    default: 'false'
  model:
    description: 'Groq model to use (default: openai/gpt-oss-120b)'
    required: false
    default: 'openai/gpt-oss-120b'
  previous_tag:
    description: 'Previous tag to compare against (defaults to latest tag)'
    required: false
  files:
    description: 'Comma-separated list of files to attach to release'
    required: false
  body_template:
    description: 'Optional template for release notes structure'
    required: false
  max_tokens:
    description: 'Max AI completion tokens (default 8000). Prevents output truncation.'
    required: false
    default: '8000'
  diff_limit:
    description: 'Max diff lines sent to AI (default 120). Higher = more depth but may exceed Groq token limits.'
    required: false
    default: '120'
  commits_limit:
    description: 'Max commit messages sent to AI (default 60). Higher = more context.'
    required: false
    default: '60'
  detail_level:
    description: 'Shortcut for depth: brief, standard, or detailed'
    required: false
    default: 'standard'
  compatibility:
    description: 'Optional. e.g. "Node 18+, Python 3.10+". Placed in Compatibility field.'
    required: false
  show_diff_section:
    description: 'Append diff section at bottom of release notes (default false)'
    required: false
    default: 'false'
  diff_section_limit:
    description: 'Max lines of inline diff in release body (default 500)'
    required: false
    default: '500'
  summarizer_model:
    description: 'Model for per-file summarization in two-stage mode. If empty, uses same as model.'
    required: false
  two_stage_char_limit:
    description: 'Use two-stage summarization when diff is under this size in chars (default 40000). Set 0 to disable.'
    required: false
    default: '40000'
  prompt_append:
    description: 'Optional text appended to the user prompt. Use for custom instructions (e.g. tone, audience, extra context).'
    required: false
  system_append:
    description: 'Optional text appended to the system prompt. Use for custom behavior or constraints.'
    required: false
  notes_style:
    description: 'Release notes format: github (default) or desqta (emoji headers, categorized sections)'
    required: false
    default: 'github'
  product_name:
    description: 'Product name for DesQTA-style title (defaults to repo name)'
    required: false
  plain_language:
    description: 'Use simple, jargon-free language that the average person can understand (default false)'
    required: false
    default: 'false'
outputs:
  release_id:
    description: 'The ID of the created release'
  release_url:
    description: 'The URL of the created release'
  release_notes:
    description: 'The generated release notes'
runs:
  using: 'node20'
  main: 'dist/index.js'

