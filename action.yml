name: 'AI Release Notes Generator'
description: 'Generate release notes using AI based on code changes since the previous release'
branding:
  icon: 'file-text'
  color: 'blue'
inputs:
  groq_api_key:
    description: 'Groq API key for AI generation'
    required: true
  tag_name:
    description: 'Tag name for the release'
    required: true
  release_name:
    description: 'Name of the release (defaults to tag_name)'
    required: false
  draft:
    description: 'Create as draft release'
    required: false
    default: 'false'
  prerelease:
    description: 'Create as prerelease'
    required: false
    default: 'false'
  model:
    description: 'Groq model to use (default: meta-llama/llama-4-maverick-17b-128e-instruct)'
    required: false
    default: 'meta-llama/llama-4-maverick-17b-128e-instruct'
  previous_tag:
    description: 'Previous tag to compare against (defaults to latest tag)'
    required: false
  files:
    description: 'Comma-separated list of files to attach to release'
    required: false
  body_template:
    description: 'Optional template for release notes structure'
    required: false
  max_tokens:
    description: 'Max AI completion tokens (default 8000). Prevents output truncation.'
    required: false
    default: '8000'
  diff_limit:
    description: 'Max diff lines sent to AI (default 120). Higher = more depth but may exceed Groq token limits.'
    required: false
    default: '120'
  commits_limit:
    description: 'Max commit messages sent to AI (default 60). Higher = more context.'
    required: false
    default: '60'
  detail_level:
    description: 'Shortcut for depth: brief, standard, or detailed'
    required: false
    default: 'standard'
  compatibility:
    description: 'Optional. e.g. "Node 18+, Python 3.10+". Placed in Compatibility field.'
    required: false
outputs:
  release_id:
    description: 'The ID of the created release'
  release_url:
    description: 'The URL of the created release'
  release_notes:
    description: 'The generated release notes'
runs:
  using: 'node20'
  main: 'dist/index.js'

