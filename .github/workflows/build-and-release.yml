name: Build and Update Release

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run package

      - name: Check for changes
        id: changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if dist/ folder has changes
          if [ -d "dist/" ]; then
            if git diff --quiet HEAD dist/ 2>/dev/null; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected in dist/ folder"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "Changes detected in dist/ folder"
              git diff --stat HEAD dist/ || true
            fi
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "dist/ folder doesn't exist, will be created"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add dist/
          if git diff --staged --quiet; then
            echo "No staged changes to commit"
          else
            git commit -m "chore: rebuild action [skip ci]" || exit 0
            git push || echo "Push failed, may need manual intervention"
          fi

      - name: Delete existing tag (if exists)
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if git rev-parse "v1.0.0" >/dev/null 2>&1; then
            git tag -d v1.0.0 || true
            git push origin :refs/tags/v1.0.0 || true
          fi

      - name: Create/Update tag v1.0.0
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git tag -f v1.0.0 -m "Auto-updated release v1.0.0"
          git push origin v1.0.0 --force

      - name: Create or Update Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: AI Release Notes Generator v1.0.0
          body: |
            ## Auto-updated Release
            
            This release was automatically updated on ${{ github.event.head_commit.timestamp || github.run_started_at }}.
            
            **Commit:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            
            ### Changes
            - Rebuilt action with latest code
            - Updated dist/ folder
            
            ---
            *This release is automatically maintained. The tag v1.0.0 will always point to the latest build.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No changes detected. Skipping release update."

