# Simple example workflow - Copy this to your project's .github/workflows/ directory
name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # IMPORTANT: Required to fetch all git history

      - name: Generate and Create Release
        id: release
        # Replace YOUR_USERNAME/ai-release-notes@v1.0.0 with your action repository
        uses: YOUR_USERNAME/ai-release-notes@v1.0.0
        with:
          groq_api_key: ${{ secrets.GROQ_API_KEY }}
          tag_name: v${{ github.event.inputs.version }}
          release_name: Release v${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Release URL
        run: echo "Release created at ${{ steps.release.outputs.release_url }}"

